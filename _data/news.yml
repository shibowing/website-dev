- date: "Jul 2026"
  tag: "RSS 2026"
  text: >-
    Excited to present our work "SuperMap: A Spatio-Temporal SLAM System for
    Visual-Language Navigation" at RSS 2026 next week! SuperMap fuses geometric
    SLAM with open-vocabulary perception to build a queryable 4D scene graph —
    a living spatial memory that tracks objects as they appear, move, and
    disappear. Everything runs online, onboard, and without any training.
  image: /img/supermap/supermap_overview_figure.png
  link: /supermap
  link_text: "Visit the project page"
- date: "Jul 2026"
  tag: "Open Source"
  text: >-
    SuperMap is now fully open source! Code, the change-detection benchmark,
    ablations, and the real-robot visual-language navigation pipeline are all
    released on GitHub. Plug in any detection + segmentation stack and build
    your own persistent semantic world model.
  link: https://github.com/superxslam/SuperMap
  link_text: "Get the code on GitHub"
